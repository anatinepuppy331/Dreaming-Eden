<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreaming Eden Bakery · Admin Panel</title>
    <!-- Tailwind + lucide icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Appwrite SDK (v16) -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@16.0.0/dist/iife/sdk.min.js"></script>
    <style>
        /* Custom styles */
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-confirmed { background: #dbeafe; color: #1e40af; }
        .status-preparing { background: #ede9fe; color: #5b21b6; }
        .status-ready { background: #d1fae5; color: #065f46; }
        .status-completed { background: #dcfce7; color: #166534; }
        .status-cancelled { background: #fee2e2; color: #991b1b; }
        
        .dark .status-pending { background: #92400e; color: #fef3c7; }
        .dark .status-confirmed { background: #1e40af; color: #dbeafe; }
        .dark .status-preparing { background: #5b21b6; color: #ede9fe; }
        .dark .status-ready { background: #065f46; color: #d1fae5; }
        .dark .status-completed { background: #166534; color: #dcfce7; }
        .dark .status-cancelled { background: #991b1b; color: #fee2e2; }

        .order-card {
            transition: all 0.2s ease;
            border: 1px solid #e5e7eb;
        }
        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        .dark .order-card {
            border-color: #1f2937;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-container {
            background: white;
            border-radius: 1.5rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
        }
        .dark .modal-container {
            background: #1f1f2e;
            color: #eee;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ec4899;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-800 dark:text-gray-200 font-sans antialiased">

<!-- ========== LOGIN MODAL ========== -->
<div id="loginModal" class="modal-overlay" style="display: flex;">
    <div class="modal-container">
        <div class="text-center mb-6">
            <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-gradient-to-r from-pink-500 to-orange-400 flex items-center justify-center">
                <i data-lucide="cake" class="w-10 h-10 text-white"></i>
            </div>
            <h2 class="text-2xl font-bold text-rainbow">Admin Login</h2>
            <p class="text-sm text-gray-500 mt-1">Enter credentials to access orders</p>
        </div>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Username</label>
                <input type="text" id="username" required 
                    class="w-full p-3 border rounded-xl dark:bg-gray-800 dark:border-gray-700"
                    placeholder="admin">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <input type="password" id="password" required 
                    class="w-full p-3 border rounded-xl dark:bg-gray-800 dark:border-gray-700"
                    placeholder="••••••••">
            </div>
            <div id="loginError" class="text-red-500 text-sm text-center hidden"></div>
            <button type="submit" 
                class="w-full bg-gradient-to-r from-pink-500 to-orange-400 text-white py-3 rounded-xl font-semibold hover:shadow-lg transition">
                Login to Dashboard
            </button>
        </form>
        
        <div class="mt-4 text-center">
            <a href="index.html" class="text-sm text-pink-600 hover:underline">← Back to Bakery</a>
        </div>
    </div>
</div>

<!-- ========== MAIN ADMIN DASHBOARD (hidden until login) ========== -->
<div id="adminDashboard" class="hidden">
    <!-- Navigation -->
    <nav class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 fixed top-0 left-0 right-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-r from-pink-500 to-orange-400 flex items-center justify-center">
                        <i data-lucide="cake" class="w-5 h-5 text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-rainbow">Dreaming Eden Admin</h1>
                        <p class="text-xs text-gray-500">Order Management</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <span class="text-sm text-gray-600 dark:text-gray-300" id="adminName">Admin</span>
                    <button id="logoutBtn" class="flex items-center gap-2 px-4 py-2 text-sm bg-red-500 text-white rounded-lg hover:bg-red-600 transition">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-20 pb-10 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
        <!-- Stats Overview -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
            <div class="bg-white dark:bg-gray-900 rounded-xl p-6 border border-gray-200 dark:border-gray-800">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">Total Orders</p>
                        <p class="text-2xl font-bold" id="totalOrders">0</p>
                    </div>
                    <div class="w-12 h-12 rounded-full bg-pink-100 dark:bg-pink-900/30 flex items-center justify-center">
                        <i data-lucide="shopping-bag" class="w-6 h-6 text-pink-600"></i>
                    </div>
                </div>
            </div>
            
            <div class="bg-white dark:bg-gray-900 rounded-xl p-6 border border-gray-200 dark:border-gray-800">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">Pending</p>
                        <p class="text-2xl font-bold text-yellow-600" id="pendingCount">0</p>
                    </div>
                    <div class="w-12 h-12 rounded-full bg-yellow-100 dark:bg-yellow-900/30 flex items-center justify-center">
                        <i data-lucide="clock" class="w-6 h-6 text-yellow-600"></i>
                    </div>
                </div>
            </div>
            
            <div class="bg-white dark:bg-gray-900 rounded-xl p-6 border border-gray-200 dark:border-gray-800">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">Confirmed</p>
                        <p class="text-2xl font-bold text-blue-600" id="confirmedCount">0</p>
                    </div>
                    <div class="w-12 h-12 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center">
                        <i data-lucide="check-circle" class="w-6 h-6 text-blue-600"></i>
                    </div>
                </div>
            </div>
            
            <div class="bg-white dark:bg-gray-900 rounded-xl p-6 border border-gray-200 dark:border-gray-800">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">Ready</p>
                        <p class="text-2xl font-bold text-green-600" id="readyCount">0</p>
                    </div>
                    <div class="w-12 h-12 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center">
                        <i data-lucide="check" class="w-6 h-6 text-green-600"></i>
                    </div>
                </div>
            </div>
            
            <div class="bg-white dark:bg-gray-900 rounded-xl p-6 border border-gray-200 dark:border-gray-800">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">Today's Orders</p>
                        <p class="text-2xl font-bold" id="todayOrders">0</p>
                    </div>
                    <div class="w-12 h-12 rounded-full bg-orange-100 dark:bg-orange-900/30 flex items-center justify-center">
                        <i data-lucide="calendar" class="w-6 h-6 text-orange-600"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters & Search -->
        <div class="bg-white dark:bg-gray-900 rounded-xl p-4 mb-6 border border-gray-200 dark:border-gray-800">
            <div class="flex flex-col sm:flex-row gap-4 items-center justify-between">
                <div class="flex gap-2 flex-wrap">
                    <button class="filter-btn px-4 py-2 rounded-lg text-sm font-medium transition" data-filter="all">
                        All Orders
                    </button>
                    <button class="filter-btn px-4 py-2 rounded-lg text-sm font-medium transition" data-filter="pending">
                        Pending
                    </button>
                    <button class="filter-btn px-4 py-2 rounded-lg text-sm font-medium transition" data-filter="confirmed">
                        Confirmed
                    </button>
                    <button class="filter-btn px-4 py-2 rounded-lg text-sm font-medium transition" data-filter="preparing">
                        Preparing
                    </button>
                    <button class="filter-btn px-4 py-2 rounded-lg text-sm font-medium transition" data-filter="ready">
                        Ready
                    </button>
                    <button class="filter-btn px-4 py-2 rounded-lg text-sm font-medium transition" data-filter="completed">
                        Completed
                    </button>
                    <button class="filter-btn px-4 py-2 rounded-lg text-sm font-medium transition" data-filter="cancelled">
                        Cancelled
                    </button>
                </div>
                
                <div class="flex gap-2 w-full sm:w-auto">
                    <input type="text" id="searchInput" placeholder="Search orders..." 
                        class="flex-1 sm:w-64 px-4 py-2 border rounded-lg dark:bg-gray-800 dark:border-gray-700">
                    <button id="refreshBtn" class="px-4 py-2 bg-gray-100 dark:bg-gray-800 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Orders List -->
        <div id="ordersContainer" class="space-y-4">
            <!-- Orders will be loaded here -->
            <div class="text-center py-12" id="loadingOrders">
                <div class="loading-spinner mx-auto mb-4"></div>
                <p class="text-gray-500">Loading orders...</p>
            </div>
        </div>
    </main>
</div>

<!-- ========== ORDER DETAIL MODAL ========== -->
<div id="orderDetailModal" class="modal-overlay">
    <div class="modal-container relative">
        <button id="closeDetailModal" class="absolute top-4 right-4 text-gray-500 hover:text-gray-800">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
        
        <div id="orderDetailContent">
            <!-- Order details will be loaded here -->
        </div>
    </div>
</div>

<!-- ========== JAVASCRIPT ========== -->
<script>
    (function() {
        // ========== APPRWRITE CONFIGURATION ==========
        const APPRWRITE_ENDPOINT = 'https://dreaming-eden-personal-projects.appwrite.network/v1'; 
        const APPRWRITE_PROJECT = '69983f5000112469fe1a'; 
        const DATABASE_ID = '69984000000355b27bc9'; 
        const COLLECTION_ID = '69984002003ba2be8a14'; // Update with your collection ID
        
        // Admin credentials (in production, use proper authentication)
        const ADMIN_USERNAME = 'admin';
        const ADMIN_PASSWORD = 'bakery2025'; // Change this!
        
        // Initialize Appwrite
        let databases = null;
        let appwriteReady = false;
        
        try {
            const client = new Appwrite.Client();
            client
                .setEndpoint(APPRWRITE_ENDPOINT)
                .setProject(APPRWRITE_PROJECT);
            databases = new Appwrite.Databases(client);
            appwriteReady = true;
            console.log('✅ Appwrite connected');
        } catch (e) {
            console.error('❌ Appwrite initialization failed:', e);
        }
        
        // DOM Elements
        const loginModal = document.getElementById('loginModal');
        const adminDashboard = document.getElementById('adminDashboard');
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const ordersContainer = document.getElementById('ordersContainer');
        const loadingOrders = document.getElementById('loadingOrders');
        const refreshBtn = document.getElementById('refreshBtn');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const orderDetailModal = document.getElementById('orderDetailModal');
        const closeDetailModal = document.getElementById('closeDetailModal');
        
        let currentFilter = 'all';
        let currentSearch = '';
        let orders = [];
        
        // ========== LOGIN FUNCTION ==========
        function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                // Successful login
                loginModal.style.display = 'none';
                adminDashboard.classList.remove('hidden');
                document.getElementById('adminName').textContent = username;
                loadOrders();
                lucide.createIcons();
            } else {
                loginError.classList.remove('hidden');
                loginError.textContent = 'Invalid username or password';
            }
        }
        
        loginForm.addEventListener('submit', handleLogin);
        
        // ========== LOGOUT ==========
        logoutBtn.addEventListener('click', () => {
            adminDashboard.classList.add('hidden');
            loginModal.style.display = 'flex';
            loginForm.reset();
            loginError.classList.add('hidden');
        });
        
        // ========== LOAD ORDERS FROM APPWRITE ==========
        async function loadOrders() {
            if (!appwriteReady || !databases) {
                showError('Database connection not available');
                return;
            }
            
            try {
                loadingOrders.classList.remove('hidden');
                ordersContainer.innerHTML = '';
                
                const response = await databases.listDocuments(
                    DATABASE_ID,
                    COLLECTION_ID
                );
                
                orders = response.documents;
                updateStats();
                filterAndDisplayOrders();
                
            } catch (error) {
                console.error('Error loading orders:', error);
                ordersContainer.innerHTML = `
                    <div class="text-center py-12 bg-red-50 dark:bg-red-900/20 rounded-xl">
                        <i data-lucide="alert-circle" class="w-12 h-12 mx-auto text-red-500 mb-3"></i>
                        <p class="text-red-600 dark:text-red-400">Failed to load orders. Please try again.</p>
                    </div>
                `;
            } finally {
                loadingOrders.classList.add('hidden');
                lucide.createIcons();
            }
        }
        
        // ========== UPDATE STATISTICS ==========
        function updateStats() {
            const total = orders.length;
            const pending = orders.filter(o => o.status === 'pending').length;
            const confirmed = orders.filter(o => o.status === 'confirmed').length;
            const preparing = orders.filter(o => o.status === 'preparing').length;
            const ready = orders.filter(o => o.status === 'ready').length;
            const completed = orders.filter(o => o.status === 'completed').length;
            const cancelled = orders.filter(o => o.status === 'cancelled').length;
            
            // Today's orders
            const today = new Date().toDateString();
            const todayOrders = orders.filter(o => {
                const orderDate = new Date(o.createdAt).toDateString();
                return orderDate === today;
            }).length;
            
            document.getElementById('totalOrders').textContent = total;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('confirmedCount').textContent = confirmed + preparing;
            document.getElementById('readyCount').textContent = ready;
            document.getElementById('todayOrders').textContent = todayOrders;
        }
        
        // ========== FILTER AND DISPLAY ORDERS ==========
        function filterAndDisplayOrders() {
            let filteredOrders = [...orders];
            
            // Apply status filter
            if (currentFilter !== 'all') {
                filteredOrders = filteredOrders.filter(o => o.status === currentFilter);
            }
            
            // Apply search
            if (currentSearch) {
                const searchLower = currentSearch.toLowerCase();
                filteredOrders = filteredOrders.filter(o => 
                    o.customerName?.toLowerCase().includes(searchLower) ||
                    o.customerEmail?.toLowerCase().includes(searchLower) ||
                    o.customerPhone?.includes(searchLower) ||
                    o.$id?.toLowerCase().includes(searchLower)
                );
            }
            
            // Sort by date (newest first)
            filteredOrders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            if (filteredOrders.length === 0) {
                ordersContainer.innerHTML = `
                    <div class="text-center py-12 bg-gray-50 dark:bg-gray-900 rounded-xl">
                        <i data-lucide="inbox" class="w-16 h-16 mx-auto text-gray-400 mb-3"></i>
                        <p class="text-gray-500">No orders found</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }
            
            let html = '';
            filteredOrders.forEach(order => {
                const date = new Date(order.createdAt).toLocaleString();
                const productType = formatProductType(order.productType);
                
                html += `
                    <div class="order-card bg-white dark:bg-gray-900 rounded-xl p-6 cursor-pointer" onclick="viewOrderDetails('${order.$id}')">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <span class="status-badge status-${order.status || 'pending'}">${order.status || 'pending'}</span>
                                    <span class="text-xs text-gray-500">#${order.$id.slice(-6)}</span>
                                </div>
                                <h3 class="font-semibold text-lg">${order.customerName}</h3>
                                <p class="text-sm text-gray-600 dark:text-gray-400">${productType} • Qty: ${order.quantity || 1}</p>
                                ${order.specialRequests ? `<p class="text-sm text-gray-500 mt-1">📝 ${order.specialRequests.substring(0, 50)}${order.specialRequests.length > 50 ? '...' : ''}</p>` : ''}
                            </div>
                            <div class="flex flex-col items-end gap-2">
                                <span class="text-sm text-gray-500">${date}</span>
                                <span class="text-sm font-medium">${order.customerEmail}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            ordersContainer.innerHTML = html;
            lucide.createIcons();
        }
        
        // ========== FORMAT PRODUCT TYPE ==========
        function formatProductType(type) {
            const types = {
                'round_cake': '🎂 Round Cake',
                'tray_cake': '🍰 Tray Cake',
                'cupcake_small': '🧁 Small Cupcake',
                'cupcake_jumbo': '🧁 Jumbo Cupcake',
                'bread': '🥖 Bread',
                'pastry': '🥐 Pastry'
            };
            return types[type] || type;
        }
        
        // ========== VIEW ORDER DETAILS ==========
        window.viewOrderDetails = async function(orderId) {
            try {
                const order = orders.find(o => o.$id === orderId);
                if (!order) return;
                
                const date = new Date(order.createdAt).toLocaleString();
                const productType = formatProductType(order.productType);
                
                let detailsHtml = `
                    <h2 class="text-2xl font-bold mb-4">Order Details</h2>
                    <div class="space-y-4">
                        <div class="border-b pb-4">
                            <div class="flex justify-between items-start">
                                <div>
                                    <span class="status-badge status-${order.status || 'pending'}">${order.status || 'pending'}</span>
                                    <span class="text-sm text-gray-500 ml-2">#${order.$id}</span>
                                </div>
                                <p class="text-sm text-gray-500">${date}</p>
                            </div>
                        </div>
                        
                        <div>
                            <h3 class="font-semibold mb-2">Customer Information</h3>
                            <p><span class="text-gray-500">Name:</span> ${order.customerName}</p>
                            <p><span class="text-gray-500">Email:</span> ${order.customerEmail}</p>
                            <p><span class="text-gray-500">Phone:</span> ${order.customerPhone || 'Not provided'}</p>
                        </div>
                        
                        <div>
                            <h3 class="font-semibold mb-2">Order Details</h3>
                            <p><span class="text-gray-500">Product:</span> ${productType}</p>
                            <p><span class="text-gray-500">Quantity:</span> ${order.quantity || 1}</p>
                `;
                
                // Add specific details based on product type
                if (order.productType === 'round_cake') {
                    detailsHtml += `
                        <p><span class="text-gray-500">Size:</span> ${order.cakeSize || 'Not specified'} cm</p>
                        <p><span class="text-gray-500">Flavor:</span> ${order.cakeFlavor || 'Not specified'}</p>
                    `;
                } else if (order.productType === 'tray_cake') {
                    detailsHtml += `
                        <p><span class="text-gray-500">Type:</span> ${order.trayCakeType || 'Not specified'}</p>
                    `;
                }
                
                detailsHtml += `
                            <p><span class="text-gray-500">Special Requests:</span></p>
                            <p class="bg-gray-50 dark:bg-gray-800 p-3 rounded-lg mt-1">${order.specialRequests || 'No special requests'}</p>
                        </div>
                        
                        <div class="border-t pt-4">
                            <h3 class="font-semibold mb-2">Update Status</h3>
                            <div class="flex flex-wrap gap-2">
                                <button onclick="updateOrderStatus('${order.$id}', 'pending')" class="px-3 py-1 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800 hover:bg-yellow-200">Pending</button>
                                <button onclick="updateOrderStatus('${order.$id}', 'confirmed')" class="px-3 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800 hover:bg-blue-200">Confirmed</button>
                                <button onclick="updateOrderStatus('${order.$id}', 'preparing')" class="px-3 py-1 rounded-full text-xs font-medium bg-purple-100 text-purple-800 hover:bg-purple-200">Preparing</button>
                                <button onclick="updateOrderStatus('${order.$id}', 'ready')" class="px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800 hover:bg-green-200">Ready</button>
                                <button onclick="updateOrderStatus('${order.$id}', 'completed')" class="px-3 py-1 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800 hover:bg-emerald-200">Completed</button>
                                <button onclick="updateOrderStatus('${order.$id}', 'cancelled')" class="px-3 py-1 rounded-full text-xs font-medium bg-red-100 text-red-800 hover:bg-red-200">Cancelled</button>
                            </div>
                        </div>
                        
                        <div class="border-t pt-4">
                            <button onclick="deleteOrder('${order.$id}')" class="w-full px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition">
                                Delete Order
                            </button>
                        </div>
                    </div>
                `;
                
                document.getElementById('orderDetailContent').innerHTML = detailsHtml;
                orderDetailModal.style.display = 'flex';
                lucide.createIcons();
                
            } catch (error) {
                console.error('Error viewing order:', error);
                alert('Failed to load order details');
            }
        };
        
        // ========== UPDATE ORDER STATUS ==========
        window.updateOrderStatus = async function(orderId, newStatus) {
            if (!confirm(`Change order status to ${newStatus}?`)) return;
            
            try {
                await databases.updateDocument(
                    DATABASE_ID,
                    COLLECTION_ID,
                    orderId,
                    { status: newStatus }
                );
                
                // Update local order
                const order = orders.find(o => o.$id === orderId);
                if (order) order.status = newStatus;
                
                updateStats();
                filterAndDisplayOrders();
                
                // Refresh detail view if open
                const modalContent = document.getElementById('orderDetailContent');
                if (modalContent && orderDetailModal.style.display === 'flex') {
                    viewOrderDetails(orderId);
                }
                
                alert('Status updated successfully');
                
            } catch (error) {
                console.error('Error updating status:', error);
                alert('Failed to update status');
            }
        };
        
        // ========== DELETE ORDER ==========
        window.deleteOrder = async function(orderId) {
            if (!confirm('Are you sure you want to delete this order? This action cannot be undone.')) return;
            
            try {
                await databases.deleteDocument(
                    DATABASE_ID,
                    COLLECTION_ID,
                    orderId
                );
                
                // Remove from local array
                orders = orders.filter(o => o.$id !== orderId);
                
                updateStats();
                filterAndDisplayOrders();
                orderDetailModal.style.display = 'none';
                
                alert('Order deleted successfully');
                
            } catch (error) {
                console.error('Error deleting order:', error);
                alert('Failed to delete order');
            }
        };
        
        // ========== FILTER HANDLERS ==========
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => {
                    b.classList.remove('bg-pink-500', 'text-white');
                    b.classList.add('bg-gray-100', 'dark:bg-gray-800', 'text-gray-700', 'dark:text-gray-300');
                });
                
                btn.classList.remove('bg-gray-100', 'dark:bg-gray-800', 'text-gray-700', 'dark:text-gray-300');
                btn.classList.add('bg-pink-500', 'text-white');
                
                currentFilter = btn.dataset.filter;
                filterAndDisplayOrders();
            });
        });
        
        // ========== SEARCH HANDLER ==========
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentSearch = e.target.value;
                filterAndDisplayOrders();
            }, 300);
        });
        
        // ========== REFRESH ==========
        refreshBtn.addEventListener('click', loadOrders);
        
        // ========== CLOSE MODAL ==========
        closeDetailModal.addEventListener('click', () => {
            orderDetailModal.style.display = 'none';
        });
        
        orderDetailModal.addEventListener('click', (e) => {
            if (e.target === orderDetailModal) {
                orderDetailModal.style.display = 'none';
            }
        });
        
        // ========== INITIAL LOAD ==========
        // Check if already logged in (for demo purposes, we start logged out)
        lucide.createIcons();
        
        // Show error if Appwrite not configured
        if (!appwriteReady) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg z-[200]';
            errorDiv.textContent = '⚠️ Appwrite not configured. Please check your credentials.';
            document.body.appendChild(errorDiv);
        }
    })();
</script>
